id: polinrider
name: PolinRider
description: >
  DPRK supply-chain campaign. Obfuscated JavaScript is appended to the end of JS
  build-config files; a temp_auto_push.bat propagates via amended commits, and
  payloads pull staged code from blockchain dead-drops (TRON/Aptos) and Vercel
  bootstrap C2. This pack detects the injected payload markers, decoder/seed
  fingerprints, hardcoded C2 addresses and domains, dropped artifacts, and the
  StakingGame template UUID. Note: the .woff2 "fake-font" sub-variant is not
  covered — that filename (e.g. fa-solid-400.woff2) is a legitimate font and
  flagging it by name would be a false positive.
references:
  - https://github.com/OpenSourceMalware/PolinRider
severity: critical

target_files:
  - "postcss.config.mjs"
  - "postcss.config.js"
  - "tailwind.config.js"
  - "eslint.config.mjs"
  - "next.config.mjs"
  - "next.config.ts"
  - "babel.config.js"
  - "jest.config.js"
  - "vite.config.js"
  - "vite.config.mjs"
  - "astro.config.mjs"
  - "webpack.config.js"
  - "vue.config.js"
  - "gridsome.config.js"
  - "truffle.js"
  - "App.js"
  - "index.js"
  - ".vscode/tasks.json"

content_signatures:
  - id: primary
    kind: literal
    value: '("rmcej%otb%",2857687)'
  - id: secondary
    kind: literal
    value: "global['!']='8-270-2';var _$_1e42="
  - id: variant-april
    kind: literal
    value: '"Cot%3t=shtP"'
  - id: decoder-v1
    kind: literal
    value: "_$_1e42"
  - id: xor-key-primary
    kind: literal
    value: "2[gWfGj;<:-93Z^C"
  - id: xor-key-secondary
    kind: literal
    value: "m6:tTh^D)cBz?NM]"
  - id: c2-tron-primary
    kind: literal
    value: "TMfKQEd7TJJa5xNZJZ2Lep838vrzrs7mAP"
  - id: c2-tron-secondary
    kind: literal
    value: "TXfxHUet9pJVU1BgVkBAbrES4YUc1nGzcG"
  - id: c2-aptos-primary
    kind: literal
    value: "0xbe037400670fbf1c32364f762975908dc43eeb38759263e7dfcdabc76380811e"
  - id: c2-aptos-secondary
    kind: literal
    value: "0x3f0e5781d0855fb460661ac63257376db1941b2bb522499e4757ecb3ebd5dce3"
  - id: staking-uuid
    kind: literal
    value: "e9b53a7c-2342-4b15-b02d-bd8b8f6a03f9"
  # Additional hardcoded C2 constants (base58 wallets / literal IPs are effectively never in
  # legit source, mirroring c2-ethereum-ip). Blockchain RPC *hosts* (trongrid/aptos/bsc/solana)
  # are deliberately NOT literals here — they are legit endpoints for real dApps and are caught
  # only in combination (rpc + xor + eval) by the capability engine's on-chain-resolve detector.
  - id: c2-tron-tertiary
    kind: literal
    value: "TA48dct6rFW8BXsiLAtjFaVFoSuryMjD3v"
  - id: c2-tron-quaternary
    kind: literal
    value: "TLmj13VL4p6NQ7jpxz8d9uYY6FUKCYatSe"
  - id: c2-exfil-ip-primary
    kind: literal
    value: "136.0.9.8"
  - id: c2-exfil-ip-secondary
    kind: literal
    value: "166.88.54.158"
  # TasksJacker bootstrap URL shape. Anchored on the /settings/<os>?flag= path so a bare
  # vercel.app reference in legitimate code cannot match.
  - id: c2-vercel-settings-url
    kind: regex
    value: 'vercel\.app/settings/(mac|linux|win)\?flag='
  # Structural / family signatures — catch new variants (e.g. dot-notation) too.
  - id: decoder-pattern
    kind: regex
    value: '_\$_[0-9a-f]{4,}'
  - id: c2-ethereum-ip
    kind: literal
    value: "23.27.20.187"
  - id: padding-run
    kind: regex
    value: '\x20{200,}'
  # Last-512-byte tail entropy. Ordinary dense source (an Express index.js, a Next
  # config) sits around 5.1-5.4 bits/byte, so a 5.0 threshold false-flagged clean
  # files as critical infections. Raised to 7.0 so ONLY genuinely near-random content
  # (encrypted/compressed/binary blobs smuggled into a config) fires — text payloads,
  # including base64 (~6.0 ceiling), are caught structurally by decoder-pattern /
  # padding-run / the analyzer, not by entropy.
  - id: entropy-tail
    kind: entropy-over
    value: "7.0"

artifacts:
  - path: "temp_auto_push.bat"
    label: "Propagation script"
  - path: "temp_interactive_push.bat"
    label: "Interactive propagation script"
  - path: "config.bat"
    label: "Hidden orchestrator"
  - path: "branch_structure.json"
    label: "Propagation branch map"

gitignore_injections:
  - "config.bat"
  - "temp_auto_push.bat"
  - "temp_interactive_push.bat"
  - "branch_structure.json"

bad_npm_packages:
  - tailwindcss-style-animate
  - tailwind-mainanimation
  - tailwind-autoanimation
  - tailwind-animationbased
  - tailwindcss-typography-style
  - tailwindcss-style-modify
  - tailwindcss-animate-style
  - tailwind-stylecss

ioc_domains:
  - default-configuration.vercel.app
  - vscode-settings-bootstrap.vercel.app
  - vscode-settings-config.vercel.app
  - vscode-bootstrapper.vercel.app
  - vscode-load-config.vercel.app
  - 260120.vercel.app
  - auth-con-firm.vercel.app
  - auth-rho-dun.vercel.app
  - coingecko-liard.vercel.app
  - chalk-logger.vercel.app
  - cloudflare-protection.vercel.app
  - locate-my-ip.vercel.app

analyzer: polinrider

remediation:
  config_payload:
    strategy: strip_after_marker
    markers:
      - "global['!']="
      - "global['_V']="
      # Generalized bracket-notation global assignment (any key). Bracket-global
      # assignment is effectively never in legit config code, so this is safe from
      # over-stripping; dot-notation is deliberately NOT matched (collides with
      # legitimate `global.x`). Under-stripping is caught by verify-after-strip.
      # Single-quoted YAML: '' -> ' and backslashes are literal, so this loads as
      # exactly re:global\[('|\x22)[^'\x22]+('|\x22)\]\s*= (see the pack round-trip test).
      - 're:global\[(''|\x22)[^''\x22]+(''|\x22)\]\s*='
      # Appended-payload structure: a long space-padding run precedes the obfuscated
      # blob. Stripping from the first 200+ space run removes the padding AND everything
      # after it (dot/variable-key globals, decoder IIFE, payload) in one cut. A run this
      # long is already a critical detection signature (padding-run), never legit source.
      - 're:\x20{200,}'
      # Dot-notation version tag (`global.i='5-3-168'`, `global.o='5-3-235-du'`). Bracket
      # markers above miss this variant, and a variable-key `global[_$_46e0[0]]=` shim
      # cannot be matched by a quoted-key regex. Assigning a digit-dash version string to
      # a global via dot-notation is a worm tell, not legitimate config code. Fallback cut
      # for a no-padding variant; harmless when the padding run matches earlier.
      - 're:global\.[A-Za-z_$][\w$]*=(''|\x22)[0-9]+-[0-9]'
      # Decoder IIFE definition (`var _$_46e0=(function`). Last-resort cut if a variant
      # ships neither padding nor a version tag; the decoder is never legitimate.
      - 're:_\$_[0-9a-f]{4,}=\(function'
    # Injected lines to delete from the surviving prefix after the payload is cut. PolinRider
    # adds an ESM re-entry shim to the TOP of `.mjs` configs so its appended payload can call
    # require(); the marker-based cut only removes the bottom blob, so strip these two lines to
    # leave a pristine config. Only applied to already-confirmed-infected files, so removing a
    # `createRequire` line here cannot harm a legitimately clean config.
    strip_lines:
      - "import { createRequire } from 'module'"
      - "createRequire(import.meta.url)"
