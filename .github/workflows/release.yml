name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write      # create the release + upload assets
  id-token: write      # OIDC token for build-provenance attestation
  attestations: write  # write the provenance attestation

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install
        working-directory: apps/desktop

      - name: Build & release desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Wormward ${{ github.ref_name }}"
          releaseBody: "Wormward ${{ github.ref_name }} — CLI binaries and desktop bundles."
          releaseDraft: false
          prerelease: false

      - name: Build CLI (release)
        run: cargo build --release -p wormward-cli

      - name: Package + checksum + upload CLI binary
        id: package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          case "${{ matrix.os }}" in
            windows-latest) src="target/release/wormward.exe"; name="wormward-${tag}-windows-x86_64.exe" ;;
            macos-latest)   src="target/release/wormward";     name="wormward-${tag}-macos-aarch64" ;;
            *)              src="target/release/wormward";     name="wormward-${tag}-linux-x86_64" ;;
          esac
          cp "$src" "$name"
          # SHA-256 checksum: sha256sum on Linux + Git-Bash/Windows, shasum on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name" > "$name.sha256"
          else
            shasum -a 256 "$name" > "$name.sha256"
          fi
          gh release upload "$tag" "$name" "$name.sha256" --clobber
          echo "artifact=$name" >> "$GITHUB_OUTPUT"

      - name: Attest CLI binary build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.artifact }}
